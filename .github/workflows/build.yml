name: Build WebView APK

on:
  workflow_dispatch:
    inputs:
      appName:
        description: 'Nama Aplikasi'
        required: true
      webUrl:
        description: 'URL Website'
        required: true
      buildTag:
        description: 'Tag Unik'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject Data
        run: |
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">${{ github.event.inputs.appName }}<\/string>/g' app/src/main/res/values/strings.xml
          sed -i 's|private String targetUrl = ".*";|private String targetUrl = "${{ github.event.inputs.webUrl }}";|g' app/src/main/java/com/contoh/webview/MainActivity.java

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # FUNGSI BARU: Menginstall Mesin Rakitan (Gradle) otomatis
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      # UPDATE: Perintah rakitan diubah dari ./gradlew menjadi gradle
      - name: Build APK
        run: gradle assembleDebug

      - name: Ubah Nama File APK
        run: mv app/build/outputs/apk/debug/app-debug.apk ${{ github.event.inputs.appName }}.apk

      - name: Buat Direct Link Download
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.buildTag }}
          name: ${{ github.event.inputs.appName }} APK
          files: ${{ github.event.inputs.appName }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
